[workspace]
members = [
    "klaw-agent",
    "klaw-core",
    "klaw-llm",
    "klaw-tool",
    "klaw-config",
    "klaw-cli", 
    "klaw-mcp", 
    "klaw-skill", 
    "klaw-memory", "klaw-cron", "klaw-storage",
]
resolver = "2"

[workspace.package]
edition = "2021"
license = "MIT"
version = "0.1.0"

[workspace.dependencies]
async-trait = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tokio = { version = "1", features = ["sync", "time", "macros", "rt"] }
uuid = { version = "1", features = ["serde", "v4"] }
reqwest = { version = "0.12", features = ["json", "rustls-tls"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
clap = { version = "4", features = ["derive", "env"] }
toml = "0.8"

zellij-client = { version = "0.43.1"}

klaw-core = { path = "klaw-core" }
klaw-llm = { path = "klaw-llm" }
klaw-tool = { path = "klaw-tool" }
klaw-config = { path = "klaw-config" }
klaw-agent = { path = "klaw-agent" }
