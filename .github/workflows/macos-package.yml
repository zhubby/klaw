name: macos-package

on:
  release:
    types:
      - published

jobs:
  build-macos-package:
    runs-on: macos-latest
    env:
      MACOS_TARGET: aarch64-apple-darwin
      APP_NAME: Klaw
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve app version
        run: |
          VERSION="$(awk -F' *= *' '/^version = / {gsub(/"/,"",$2); print $2; exit}' Cargo.toml)"
          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build macOS app bundle
        run: make build-macos-app

      - name: Import Apple signing certificate
        if: secrets.APPLE_SIGNING_CERT_BASE64 != '' && secrets.APPLE_SIGNING_CERT_PASSWORD != '' && secrets.APPLE_TEAM_ID != ''
        env:
          APPLE_SIGNING_CERT_BASE64: ${{ secrets.APPLE_SIGNING_CERT_BASE64 }}
          APPLE_SIGNING_CERT_PASSWORD: ${{ secrets.APPLE_SIGNING_CERT_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/apple-signing-cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          echo "$APPLE_SIGNING_CERT_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_SIGNING_CERT_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s "$KEYCHAIN_PATH"

      - name: Codesign app bundle
        if: secrets.APPLE_SIGNING_CERT_BASE64 != '' && secrets.APPLE_SIGNING_CERT_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' && secrets.APPLE_SIGNING_IDENTITY != ''
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          codesign --force --deep --options runtime --sign "$APPLE_SIGNING_IDENTITY" dist/macos/Klaw.app

      - name: Build macOS dmg
        run: make package-macos-dmg

      - name: Codesign dmg
        if: secrets.APPLE_SIGNING_CERT_BASE64 != '' && secrets.APPLE_SIGNING_CERT_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' && secrets.APPLE_SIGNING_IDENTITY != ''
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          DMG_PATH="dist/macos/Klaw-${APP_VERSION}-${MACOS_TARGET}.dmg"
          codesign --force --sign "$APPLE_SIGNING_IDENTITY" "$DMG_PATH"

      - name: Notarize dmg
        if: secrets.APPLE_NOTARY_APPLE_ID != '' && secrets.APPLE_NOTARY_TEAM_ID != '' && secrets.APPLE_NOTARY_PASSWORD != ''
        env:
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
          APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
        run: |
          DMG_PATH="dist/macos/Klaw-${APP_VERSION}-${MACOS_TARGET}.dmg"
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_NOTARY_APPLE_ID" \
            --team-id "$APPLE_NOTARY_TEAM_ID" \
            --password "$APPLE_NOTARY_PASSWORD" \
            --wait
          xcrun stapler staple "$DMG_PATH"

      - name: Upload dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: Klaw-dmg-${{ env.APP_VERSION }}-aarch64-apple-darwin
          path: dist/macos/*.dmg
