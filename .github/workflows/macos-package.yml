name: macos-package

on:
  release:
    types:
      - published

jobs:
  build-macos-package:
    runs-on: macos-latest
    env:
      MACOS_TARGET: aarch64-apple-darwin
      APP_NAME: Klaw
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve app version
        run: |
          VERSION="$(awk -F' *= *' '/^version = / {gsub(/"/,"",$2); print $2; exit}' Cargo.toml)"
          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build macOS app bundle
        run: make build-macos-app

      - name: Upload macOS binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: Klaw-bin-${{ env.APP_VERSION }}-${{ env.MACOS_TARGET }}
          path: target/${{ env.MACOS_TARGET }}/release/klaw

      - name: Build macOS dmg
        run: make package-macos-dmg

      - name: Upload dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: Klaw-dmg-${{ env.APP_VERSION }}-aarch64-apple-darwin
          path: dist/macos/*.dmg